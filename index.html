<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>:root {
    --bg-main: #000000;
    --bg-secondary: #0a0a0a;
    --bg-panel: rgba(15, 15, 15, 0.7);
    --primary: #16a34a; /* Green 600 */
    --primary-light: #22c55e;
    --primary-dark: #15803d;
    --danger: #ef4444;
    --text-main: #ffffff;
    --text-muted: #9ca3af;
    --border-color: rgba(255, 255, 255, 0.1);
    
    --glow-primary: rgba(34, 197, 94, 0.15);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.text-primary { color: var(--primary-light); }
.text-muted { color: var(--text-muted); }
.text-danger { color: var(--danger); }
.hidden { display: none !important; }

/* Background Effects */
.bg-effects {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    pointer-events: none;
    background-image: radial-gradient(circle at center, rgba(255,255,255,0.02) 0%, transparent 100%);
}

.glow-orb {
    position: absolute;
    width: 40vw;
    height: 40vh;
    background: radial-gradient(circle, var(--glow-primary) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(80px);
}
.glow-orb.top-left { top: -20%; left: -10%; }
.glow-orb.bottom-right { bottom: -20%; right: -10%; }

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
    z-index: 10;
}

.logo-text {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.025em;
}

.btn-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    color: var(--text-muted);
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-icon:hover {
    color: white;
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
}

/* Dashboard */
.dashboard {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    gap: 1.5rem;
    max-width: 1600px;
    margin: 0 auto;
    width: 100%;
    overflow: hidden;
}

.panels-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    overflow: hidden;
}

@media (min-width: 1024px) {
    .panels-container {
        flex-direction: row;
    }
}

.panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
    border: 1px solid var(--border-color);
    border-radius: 1rem;
    backdrop-filter: blur(16px);
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.02);
}

.panel-title {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1rem;
    font-weight: 600;
}

.badge-pill {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.25rem 0.75rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
}

.badge-pill.soft-green {
    background: rgba(34, 197, 94, 0.1);
    border-color: rgba(34, 197, 94, 0.3);
    color: var(--primary-light);
}

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--danger);
}
.dot.green { background: var(--primary-light); }

.pulse {
    animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

.panel-body {
    flex: 1;
    padding: 1.5rem;
    overflow-y: auto;
    font-size: 1.125rem;
    line-height: 1.6;
}

.panel-body::-webkit-scrollbar {
    width: 8px;
}
.panel-body::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.1);
}
.panel-body::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
}

.placeholder-text {
    color: rgba(255,255,255,0.3);
    font-style: italic;
}

.transcript-line {
    margin-bottom: 1rem;
    color: rgba(255,255,255,0.9);
}
.transcript-line.interim {
    color: rgba(255,255,255,0.5);
}

.answer-block {
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: rgba(34, 197, 94, 0.05);
    border-left: 2px solid var(--primary);
    border-radius: 0 0.5rem 0.5rem 0;
}
.answer-block p {
    margin-bottom: 0.75rem;
}
.answer-block p:last-child {
    margin-bottom: 0;
}

/* Controls Bar */
.controls-bar {
    display: flex;
    justify-content: center;
    gap: 1rem;
    padding-bottom: 0.5rem;
}

.btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: linear-gradient(90deg, var(--primary-dark), var(--primary-light));
    color: white;
    font-weight: 600;
    padding: 0.75rem 1.5rem;
    border-radius: 9999px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
    transition: all 0.2s ease;
}

.btn-primary:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 30px rgba(34, 197, 94, 0.5);
}

.btn-primary.huge {
    padding: 1rem 3rem;
    font-size: 1.125rem;
}

.btn-primary.recording {
    background: linear-gradient(90deg, #991b1b, #ef4444);
    box-shadow: 0 4px 30px rgba(239, 68, 68, 0.4);
}
.btn-primary.recording:hover {
    box-shadow: 0 4px 40px rgba(239, 68, 68, 0.6);
}

.btn-secondary {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 0.75rem 1.5rem;
    border-radius: 9999px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
}
.btn-secondary:hover {
    background: rgba(255,255,255,0.15);
}

/* Modal */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
}

.modal {
    background: #111;
    border: 1px solid var(--border-color);
    border-radius: 1rem;
    width: 90%;
    max-width: 450px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: modalSlideIn 0.3s ease;
}

@keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.modal-header h3 {
    font-size: 1.25rem;
}

.btn-close {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
}
.btn-close:hover { color: white; }

.modal-body {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.form-group label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-muted);
}

.form-group input, .form-group select {
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 0.5rem;
    padding: 0.75rem;
    color: white;
    font-family: inherit;
    font-size: 1rem;
}
.form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
}

.help-text {
    font-size: 0.75rem;
    color: var(--text-muted);
}

.modal-footer {
    padding: 1.25rem 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: flex-end;
}
</style>
</head>
<body>
    <div class="bg-effects">
        <div class="glow-orb top-left"></div>
        <div class="glow-orb bottom-right"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <span class="logo-text">Interview<span class="text-primary">AI</span></span>
        </div>
        <div class="header-controls">
            <button id="btnSettings" class="btn-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </header>

    <!-- Main Dashboard -->
    <main class="dashboard">
        <div class="panels-container">
            <!-- Transcript Panel -->
            <div class="panel transcript-panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
                        Live Transcript
                    </h2>
                    <span id="listeningIndicator" class="badge-pill hidden">
                        <span class="dot pulse"></span> Listening
                    </span>
                </div>
                <div class="panel-body" id="transcriptBody">
                    <p class="placeholder-text">Click "Start Listening" to begin capturing the interview questions...</p>
                </div>
            </div>

            <!-- AI Answer Panel -->
            <div class="panel answer-panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                        Suggested Answer
                    </h2>
                    <span id="aiThinkingIndicator" class="badge-pill soft-green hidden">
                        <span class="dot pulse green"></span> AI Thinking
                    </span>
                </div>
                <div class="panel-body" id="answerBody">
                    <p class="placeholder-text text-muted">AI suggested answers will appear here in real-time...</p>
                </div>
            </div>
        </div>

        <div class="controls-bar">
            <button id="btnToggleListening" class="btn-primary huge">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
                <span>Start Listening</span>
            </button>
            <button id="btnClear" class="btn-secondary hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                Clear
            </button>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Settings</h3>
                <button id="btnCloseSettings" class="btn-close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>AI Provider</label>
                    <select id="aiProvider">
                        <option value="gemini">Google Gemini (Recommended)</option>
                        <option value="openai">OpenAI (ChatGPT)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="apiKey" placeholder="Paste your API key here...">
                    <p class="help-text">Your API key is stored locally in your browser and never sent anywhere else.</p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btnSaveSettings" class="btn-primary">Save Settings</button>
            </div>
        </div>
    </div>

    <script>document.addEventListener('DOMContentLoaded', () => {
    // UI Elements
    const btnSettings = document.getElementById('btnSettings');
    const settingsModal = document.getElementById('settingsModal');
    const btnCloseSettings = document.getElementById('btnCloseSettings');
    const btnSaveSettings = document.getElementById('btnSaveSettings');
    const aiProviderSelect = document.getElementById('aiProvider');
    const apiKeyInput = document.getElementById('apiKey');
    
    const btnToggleListening = document.getElementById('btnToggleListening');
    const btnClear = document.getElementById('btnClear');
    
    const transcriptBody = document.getElementById('transcriptBody');
    const answerBody = document.getElementById('answerBody');
    const listeningIndicator = document.getElementById('listeningIndicator');
    const aiThinkingIndicator = document.getElementById('aiThinkingIndicator');

    // State
    let isListening = false;
    let recognition = null;
    let finalTranscript = '';
    let currentInterimTranscript = '';
    let aiDebounceTimer = null;
    let lastProcessedTranscriptLength = 0;

    // Load Settings
    const loadSettings = () => {
        const provider = localStorage.getItem('aiProvider') || 'gemini';
        const key = localStorage.getItem('apiKey') || '';
        aiProviderSelect.value = provider;
        apiKeyInput.value = key;
    };
    loadSettings();

    // Settings Modal Handlers
    btnSettings.addEventListener('click', () => settingsModal.classList.remove('hidden'));
    btnCloseSettings.addEventListener('click', () => settingsModal.classList.add('hidden'));
    btnSaveSettings.addEventListener('click', () => {
        localStorage.setItem('aiProvider', aiProviderSelect.value);
        localStorage.setItem('apiKey', apiKeyInput.value.trim());
        settingsModal.classList.add('hidden');
    });

    // Clear Button
    btnClear.addEventListener('click', () => {
        finalTranscript = '';
        lastProcessedTranscriptLength = 0;
        transcriptBody.innerHTML = '<p class="placeholder-text">Waiting for speech...</p>';
        answerBody.innerHTML = '<p class="placeholder-text text-muted">AI suggested answers will appear here in real-time...</p>';
    });

    // Initialize Speech Recognition
    const initSpeechRecognition = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert('Your browser does not support the Web Speech API. Please use Google Chrome or Microsoft Edge.');
            return false;
        }

        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            isListening = true;
            btnToggleListening.classList.add('recording');
            btnToggleListening.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg><span>Stop Listening</span>';
            listeningIndicator.classList.remove('hidden');
            btnClear.classList.remove('hidden');
            
            if (transcriptBody.querySelector('.placeholder-text')) {
                transcriptBody.innerHTML = '';
            }
        };

        recognition.onerror = (event) => {
            console.error('Speech recognition error', event.error);
            if (event.error === 'not-allowed') {
                alert('Microphone access was denied. Please allow microphone permissions.');
                stopListening();
            }
        };

        recognition.onend = () => {
            // Auto-restart if we didn't explicitly stop it (handles silent timeouts)
            if (isListening) {
                try {
                    recognition.start();
                } catch(e) {
                    console.log("Restart failed, stopping.", e);
                    stopListening();
                }
            } else {
                stopListening();
            }
        };

        recognition.onresult = (event) => {
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                } else {
                    interim += event.results[i][0].transcript;
                }
            }
            currentInterimTranscript = interim;
            updateTranscriptUI();
            
            // Trigger AI request if there's enough new final text
            triggerAIProcessing();
        };

        return true;
    };

    const stopListening = () => {
        isListening = false;
        if (recognition) recognition.stop();
        
        btnToggleListening.classList.remove('recording');
        btnToggleListening.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg><span>Start Listening</span>';
        listeningIndicator.classList.add('hidden');
    };

    btnToggleListening.addEventListener('click', () => {
        if (isListening) {
            stopListening();
        } else {
            if (!recognition && !initSpeechRecognition()) return;
            try {
                recognition.start();
            } catch (e) {
                console.error("Could not start recognition:", e);
            }
        }
    });

    const updateTranscriptUI = () => {
        let html = '';
        if (finalTranscript) {
            html += `<p class="transcript-line">${finalTranscript}</p>`;
        }
        if (currentInterimTranscript) {
            html += `<p class="transcript-line interim">${currentInterimTranscript}</p>`;
        }
        transcriptBody.innerHTML = html;
        transcriptBody.scrollTop = transcriptBody.scrollHeight;
    };

    // AI Logic
    const triggerAIProcessing = () => {
        // Only process if we have a decent chunk of new text (e.g. > 30 chars) or after a pause
        const newText = finalTranscript.substring(lastProcessedTranscriptLength).trim();
        
        clearTimeout(aiDebounceTimer);
        
        if (newText.length > 20) {
            // If they pause for 1.5 seconds, send it to the AI
            aiDebounceTimer = setTimeout(() => {
                fetchAIAnswer(finalTranscript); // Send the full context so far
                lastProcessedTranscriptLength = finalTranscript.length;
            }, 1500);
        }
    };

    const fetchAIAnswer = async (context) => {
        const apiKey = localStorage.getItem('apiKey');
        const provider = localStorage.getItem('aiProvider');

        if (!apiKey) {
            answerBody.innerHTML = '<p class="text-danger">API Key is missing. Please click the Settings gear to add it.</p>';
            return;
        }

        aiThinkingIndicator.classList.remove('hidden');

        try {
            let answerText = '';
            
            if (provider === 'gemini') {
                answerText = await callGeminiAPI(apiKey, context);
            } else {
                answerText = await callOpenAIAPI(apiKey, context);
            }

            // Remove placeholder if present
            if (answerBody.querySelector('.placeholder-text')) {
                answerBody.innerHTML = '';
            }

            const answerHtml = `
                <div class="answer-block">
                    <p><strong>Context processed:</strong></p>
                    <p>${formatAnswer(answerText)}</p>
                </div>
            `;
            
            answerBody.insertAdjacentHTML('beforeend', answerHtml);
            answerBody.scrollTop = answerBody.scrollHeight;

        } catch (error) {
            console.error("AI API Error:", error);
            const errHtml = `<div class="answer-block"><p class="text-danger">Error fetching answer: ${error.message}</p></div>`;
            answerBody.insertAdjacentHTML('beforeend', errHtml);
        } finally {
            aiThinkingIndicator.classList.add('hidden');
        }
    };

    const formatAnswer = (text) => {
        return text.replace(/\n/g, '<br/>');
    };

    const callGeminiAPI = async (apiKey, context) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    role: "user",
                    parts: [{
                        text: `You are an expert interview assistant providing live help to a candidate.\n\nThe following is a live transcript of the interview so far:\n"${context}"\n\nIdentify the most recent question asked by the interviewer, and provide a short, concise, and excellent suggested answer or talking points for the candidate.`
                    }]
                }]
            })
        });

        const data = await response.json();
        if (!response.ok) {
            throw new Error(`Gemini API Error: ${data.error?.message || response.statusText || 'Unknown Error'}`);
        }
        
        return data.candidates[0].content.parts[0].text;
    };

    const callOpenAIAPI = async (apiKey, context) => {
        const url = 'https://api.openai.com/v1/chat/completions';
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: "gpt-3.5-turbo",
                messages: [
                    { 
                        role: "system", 
                        content: "You are an expert interview assistant providing live help to a candidate. Identify the most recent question in the transcript and provide a short, concise, and excellent suggested answer." 
                    },
                    { role: "user", content: `Transcript:\n${context}` }
                ]
            })
        });

        const data = await response.json();
        if (!response.ok) {
            throw new Error(`OpenAI API Error: ${data.error?.message || response.statusText || 'Unknown Error'}`);
        }
        
        return data.choices[0].message.content;
    };
});
</script>
</body>
